server:
  port: 9000

spring:
  application:
    name: testify-service

  datasource:
    url: jdbc:postgresql://localhost:5432/testify_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Cấu hình Virtual Threads (Spring Boot 3.2+)
  threads:
    virtual:
      enabled: true

# Tùy chỉnh config riêng của Testify
testify:
  log-dir: D:/test_results
  max-concurrent-requests: 100
